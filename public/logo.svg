<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="fi_niaR mark">
  <title>fi_niaR</title>
  <desc>Two stacked raindrops forming a stylised i/f monogram — the dot of i sits above the merged stem.</desc>
  <!-- Top droplet = dot of "i" / single rain -->
  <path d="M32 6 C 28 11.5, 25.6 14.5, 25.6 17 a 6.4 6.4 0 0 0 12.8 0 C 38.4 14.5, 36 11.5, 32 6 Z" fill="currentColor"/>
  <!-- Bottom droplet, larger = stems of "i" and "f" merged -->
  <path d="M32 26 C 24 36, 17.6 42.5, 17.6 47.5 a 14.4 14.4 0 0 0 28.8 0 C 46.4 42.5, 40 36, 32 26 Z" fill="currentColor"/>
  <!-- Horizontal accent = "f" crossbar / water-surface, knocked out of the lower drop -->
  <rect x="20.5" y="43.5" width="23" height="2.8" rx="1.4" fill="#FAFAF7"/>
</svg>
